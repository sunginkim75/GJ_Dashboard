<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>경조사 관리 시스템</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Vanilla CSS -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- 로딩 인디케이터 -->
    <div id="loading" class="loading-overlay hidden">
        <div class="spinner"></div>
    </div>

    <!-- 토스트 메시지 -->
    <div id="toast" class="toast-container hidden"></div>

    <!-- 1. 로그인 화면 -->
    <div id="login-page" class="page-container flex-center">
        <div class="login-card glass">
            <div class="login-header">
                <div class="logo-icon">💝</div>
                <h1>경조사 관리</h1>
                <p>구글 계정으로 로그인하여 경조사 내역을 조회하고 등록하세요.</p>
            </div>
            
            <div class="login-action">
                <!-- 구글 로그인 버튼 컨테이너 -->
                <div id="google-login-btn"></div>
            </div>
            
            <div class="login-footer">
                <p>지정된 구글 이메일 소유자만 접근할 수 있습니다.</p>
            </div>
        </div>
    </div>

    <!-- 2. 메인 앱 화면 -->
    <div id="app-page" class="page-container hidden">
        <!-- 상단 헤더 -->
        <header class="app-header glass">
            <div class="header-logo">
                <span class="logo-emoji">💝</span>
                <h2>경조사 장부</h2>
            </div>
            <div class="user-profile" id="user-profile-menu">
                <img id="user-avatar" src="" alt="Profile" class="avatar">
                <div class="user-info">
                    <span id="user-name" class="user-name">사용자</span>
                </div>
                <button id="btn-logout" class="btn-logout" title="로그아웃">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16 17v-3H9v-4h7V7l5 5-5 5M14 2a2 2 0 0 1 2 2v2h-2V4H5v16h9v-2h2v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9z"/></svg>
                </button>
            </div>
        </header>

        <!-- 메인 컨텐츠 영역 -->
        <main class="app-content">
            <!-- 탭 1: 경조사 조회 -->
            <section id="tab-search" class="tab-panel active">
                <div class="search-bar-container">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="search-input" placeholder="이름을 입력하여 검색..." autocomplete="off">
                        <button id="btn-clear-search" class="btn-clear hidden">&times;</button>
                    </div>
                </div>

                <div class="results-meta">
                    <span>검색 결과: <strong id="results-count">0</strong>건</span>
                </div>

                <!-- 검색 결과 리스트 -->
                <div id="results-list" class="cards-container">
                    <div class="empty-state">
                        <div class="empty-icon">🔎</div>
                        <p>이름을 입력해 검색을 시작해 보세요.</p>
                    </div>
                </div>
            </section>

            <!-- 탭 2: 경조사 등록 -->
            <section id="tab-add" class="tab-panel">
                <div class="form-card glass">
                    <form id="event-form" novalidate>
                        <div class="form-group row-toggle">
                            <label>구분</label>
                            <div class="toggle-container">
                                <label class="toggle-btn active">
                                    <input type="radio" name="입출금" value="입금" checked>
                                    <span>받음 (입금)</span>
                                </label>
                                <label class="toggle-btn">
                                    <input type="radio" name="입출금" value="출금">
                                    <span>보냄 (출금)</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="form-date">날짜 <span class="required">*</span></label>
                                <input type="date" id="form-date" name="날짜" required>
                            </div>

                            <div class="form-group">
                                <label for="form-name">이름 <span class="required">*</span></label>
                                <input type="text" id="form-name" name="이름" placeholder="홍길동" required>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="form-event">경조사명 <span class="required">*</span></label>
                                <div class="select-editable">
                                    <select id="form-event-select">
                                        <option value=""></option>
                                        <option value="아들결혼">아들결혼</option>
                                        <option value="딸결혼">딸결혼</option>
                                        <option value="본인결혼">본인결혼</option>
                                        <option value="부친상">부친상</option>
                                        <option value="모친상">모친상</option>
                                        <option value="빙부상">빙부상</option>
                                        <option value="빙모상">빙모상</option>
                                        <option value="돌잔치">돌잔치</option>
                                        <option value="칠순잔치">칠순잔치</option>
                                    </select>
                                    <input type="text" id="form-event" name="경조사명" placeholder="경조사 직접 입력" required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="form-amount">금액 <span class="required">*</span></label>
                                <div class="price-input-wrapper">
                                    <input type="text" id="form-amount" name="축의금" placeholder="0" required inputmode="numeric">
                                    <span class="currency-unit">원</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="form-company">소속 / 회사</label>
                                <input type="text" id="form-company" name="회사" placeholder="예: 하이닉스, 키파운드리, 친가, 외가 등">
                            </div>

                            <div class="form-group">
                                <label for="form-who">대상 (누구)</label>
                                <div class="select-editable">
                                    <select id="form-who-select">
                                        <option value=""></option>
                                        <option value="김성인">김성인</option>
                                        <option value="김영숙">김영숙</option>
                                        <option value="김성인/김영숙">김성인/김영숙</option>
                                    </select>
                                    <input type="text" id="form-who" name="누구" placeholder="우리 쪽 관계자 이름" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="form-attend">참석 여부</label>
                                <div class="toggle-container-simple">
                                    <label class="toggle-btn active">
                                        <input type="radio" name="참석" value="X" checked>
                                        <span>미참석 (X)</span>
                                    </label>
                                    <label class="toggle-btn">
                                        <input type="radio" name="참석" value="O">
                                        <span>참석 (O)</span>
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="form-method">입출금 방법</label>
                                <select id="form-method" name="입출금방법">
                                    <option value="통장입금">통장입금</option>
                                    <option value="봉투">봉투</option>
                                    <option value="직접전달">직접전달</option>
                                    <option value="기타">기타</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="form-remark">비고 (Remark)</label>
                            <textarea id="form-remark" name="Remark" placeholder="가족명 또는 상세 비고사항 기재..." rows="2"></textarea>
                        </div>

                        <button type="submit" class="btn-submit">📝 경조사 등록하기</button>
                    </form>
                </div>
            </section>
        </main>

        <!-- 하단 네비게이션 바 -->
        <nav class="app-nav glass">
            <button class="nav-item active" data-tab="search">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">조회</span>
            </button>
            <button class="nav-item" data-tab="add">
                <span class="nav-icon">✍️</span>
                <span class="nav-label">등록</span>
            </button>
        </nav>
    </div>

    <!-- JS 로드 -->
    <script src="/static/app.js"></script>
</body>
</html>
